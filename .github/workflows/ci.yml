name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: "Test suite (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests (excluding e2e)
        run: pytest -v --tb=short

      - name: Smoke test (--dry-run --test)
        run: |
          bash setup.sh --target /tmp/ci-smoke-test --test

          if bash setup.sh --dry-run --test --target /tmp/ci-smoke-dryrun; then
            echo "ERROR: --dry-run --test unexpectedly passed"
            exit 1
          else
            echo "OK: --dry-run --test failed as expected"
          fi
