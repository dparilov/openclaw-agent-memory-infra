# Secrets Registry Template
# Copy to ~/.agent-secrets/global/registry.yaml or
# ~/.agent-secrets/projects/<project-name>/registry.yaml
# Do NOT commit this file after filling in real paths/values.

version: 1

# scope: global | project
scope: project

# project name (for project-scoped registries)
project: <project-name>

secret_root: ~/.agent-secrets
exchange_dir: ~/.agent-secrets/exchange

# ---------------------------------------------------------------------------
# secrets: list of secret entries
# Each entry describes WHERE a secret lives and WHAT it is for.
# The registry must NOT contain actual secret values.
# ---------------------------------------------------------------------------
secrets:
  # Pyrogram user session
  - id: telegram.pyrogram.handoff_dispatcher
    type: pyrogram_session
    location: ~/.agent-secrets/pyrogram/handoff_dispatcher.session
    purpose: Send handoff dispatch messages to Telegram topics.
    access_policy: local_only
    owner: human

  # Environment file with application credentials
  - id: <project-name>.local.env
    type: env_file
    location: ~/.agent-secrets/projects/<project-name>/.env
    purpose: <Describe what runtime this env file supports.>
    access_policy: local_only
    owner: human

  # OAuth token file
  - id: google.calendar.oauth
    type: oauth_token
    location: ~/.agent-secrets/projects/<project-name>/oauth/google_calendar.json
    purpose: <Describe what service this token provides access to.>
    access_policy: local_only
    owner: human

  # Generic secret file
  - id: <custom.secret.id>
    type: secret_file   # pyrogram_session | env_file | oauth_token | api_key | secret_file
    location: ~/.agent-secrets/<path/to/secret-file>
    purpose: <One-sentence description.>
    access_policy: local_only
    owner: human

# ---------------------------------------------------------------------------
# accounts: service accounts and credentials that reference the above secrets
# ---------------------------------------------------------------------------
accounts:
  - id: telegram.dispatcher_user
    service: Telegram
    login_hint: "@<username>"       # non-secret hint only
    purpose: Pyrogram user session for handoff dispatch.
    secret_ref: telegram.pyrogram.handoff_dispatcher

  - id: <project-name>.local_admin
    service: <service-name>
    url: "<service-url>"
    login_hint: "<non-secret login hint>"
    secret_ref: <project-name>.local.env

  - id: google.calendar_user
    service: Google Calendar
    login_hint: "<user@example.com>"
    purpose: Read/write calendar events.
    secret_ref: google.calendar.oauth
